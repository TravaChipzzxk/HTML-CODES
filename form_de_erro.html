<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Erro</title>
</head>

<body>
    <form action="">
        <label for="">Resuma o seu problema:</label>
        <input type="text" name="" id=""><br>
        <label for="">E-mail:</label>
        <input type="email" name="" id=""><br>
        <label for="">Data do ocorrido:</label>
        <input type="date" name="" id=""><br>
        <label for="">Categoria do erro:</label>
        <select name="" id="">
            <option value="">Front-end</option>
            <option value="">Back-end</option>
            <option value="">Instraestrutura</option>
            <option value="">Banco de Dados</option>
        </select><br>
        <label for="">Nível do erro:</label>
        <input type="checkbox" name="" id="">1 Baixo
        <input type="checkbox" name="" id="">2 Intermediário
        <input type="checkbox" name="" id="">3 Médio
        <input type="checkbox" name="" id="">4 Risco
        <input type="checkbox" name="" id="">5 Crítico<br>
        <label for="">É reproduzível?</label>
        <input type="radio" name="" id="">Sim.
        <input type="radio" name="" id="">Não.<br>
        <label for="">Captura do erro ou print</label>
        <input type="file" name="" id=""><br>
        <label for="">Detalhe o problema</label>
        <input type="text" style="width: 300px; height: 50px; padding: 10px; font-size: 18px;"><br>
        <button>Enviar relatório</button>
        <button>Limpar relatório</button><br>


    </form>
</body>

</html>
